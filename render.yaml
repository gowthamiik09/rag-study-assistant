services:
  - type: web
    name: rag-study-assistant-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false  # Will prompt for value during deploy
      - key: GROQ_MODEL
        value: mixtral-8x7b-32768
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: CHROMA_PERSIST_DIR
        value: ./chroma_db
      - key: UPLOAD_DIR
        value: ./uploads
      - key: CHUNK_SIZE
        value: "1000"
      - key: CHUNK_OVERLAP
        value: "200"
      - key: MAX_RETRIEVAL_DOCS
        value: "5"
      - key: PYTHON_VERSION
        value: "3.11.9"
